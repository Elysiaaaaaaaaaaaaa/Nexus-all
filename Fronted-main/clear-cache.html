<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除缓存并跳转到登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #007bff;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .btn:hover {
            background: #0056b3;
        }
        .btn.secondary {
            background: #6c757d;
        }
        .btn.secondary:hover {
            background: #545b62;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 登录问题诊断</h1>
        <div class="info">
            <strong>问题：</strong>浏览器中没有显示登录界面<br>
            <strong>原因：</strong>可能有缓存问题或认证状态冲突
        </div>

        <button class="btn" onclick="clearAndLogin()">清除缓存并登录</button>
        <button class="btn secondary" onclick="goToLogin()">直接跳转到登录</button>
        <button class="btn secondary" onclick="checkStatus()">检查状态</button>

        <div id="status" style="margin-top: 20px; display: none;">
            <div id="status-content"></div>
        </div>
    </div>

    <script>
        function clearAndLogin() {
            // 清除所有相关缓存
            localStorage.clear();
            sessionStorage.clear();

            // 显示状态
            showStatus('✅ 已清除缓存，正在跳转到登录页面...', 'green');

            // 跳转到登录页面
            setTimeout(() => {
                window.location.href = '/login';
            }, 1000);
        }

        function goToLogin() {
            window.location.href = '/login';
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/v1/health');
                if (response.ok) {
                    showStatus('✅ 后端服务正常 (端口: 8007)', 'green');
                } else {
                    showStatus('❌ 后端服务异常', 'red');
                }
            } catch (error) {
                showStatus('❌ 无法连接后端服务: ' + error.message, 'red');
            }
        }

        function showStatus(message, color) {
            const statusDiv = document.getElementById('status');
            const statusContent = document.getElementById('status-content');
            statusContent.textContent = message;
            statusContent.style.color = color;
            statusDiv.style.display = 'block';
        }

        // 页面加载时自动检查状态
        window.onload = function() {
            setTimeout(checkStatus, 500);
        };
    </script>
</body>
</html>
