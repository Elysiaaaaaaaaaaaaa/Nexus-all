
<!DOCTYPE html>
<html>
<head>
    <title>Users - Database Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .table th { background-color: #f2f2f2; }
        .nav { background: #f8f9fa; padding: 10px; margin: -20px -20px 20px -20px; }
        .nav a { margin: 0 15px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Overview</a>
        <a href="/users">Users</a>
        <a href="/projects">Projects</a>
    </div>

    <h1>Users Management</h1>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Password Hash</th>
                <th>Plain Password</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
                <td style="font-family: monospace; font-size: 12px;">{{ user.password_hash }}</td>
                <td style="color: #2563eb; font-weight: bold;">{{ user.plain_password }}</td>
                <td>{{ user.created_at }}</td>
                <td>
                    <button onclick="deleteUser({{ user.id }})">Delete</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                fetch(`/api/users/${userId}`, { method: 'DELETE' })
                    .then(() => location.reload());
            }
        }
    </script>
</body>
</html>
